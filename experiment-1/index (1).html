<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <div class="logo">naukri</div>

        <div class="nav-links">
            <a href="#">Jobs</a>
            <a href="#">Companies</a>
            <a href="#">Services</a>
        </div>

        <div class="auth">
            <a href="#" class="login">Login</a>
            <a href="#" class="register">Register</a>
        </div>
    </div>

    <div class="hero">
        <h1>Find your dream job now</h1>
        <p>5 lakh+ jobs for you to explore</p>

        <div class="search-box">
            <input type="text" placeholder="Enter skills / designations / companies">
            <input type="text" placeholder="Experience">
            <input type="text" placeholder="Location">
            <button>Search</button>
        </div>
    </div>

    <div class="offer">
        <p class="small">Winter offer</p>
        <h2>25% off on Pro</h2>
        <button>Claim your offer</button>
    </div>

    <div class="categories">
        <div class="cat">Remote</div>
        <div class="cat">MNC</div>
        <div class="cat">Fortune 500</div>
        <div class="cat">Marketing</div>
        <div class="cat">Fresher</div>
        <div class="cat">Software</div>
        <div class="cat">Engineering</div>
        <div class="cat">Internship</div>
        <div class="cat">Startup</div>
    </div>

</body>
</html>
